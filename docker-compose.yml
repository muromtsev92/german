version: '3.8'

services:
  postgres:
    image: postgres:14
    container_name: german-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: german
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: s25992/german-backend:latest
    container_name: german-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/german
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8080:8080"
    depends_on:
      - german-db

volumes:
  postgres_data:
